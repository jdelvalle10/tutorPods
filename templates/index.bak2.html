<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doral Academy AI Tutor</title>

    <!-- Markdown Parser for formatting text, lists, and basic tables -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- MathJax Configuration and Script for rendering textbook equations -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            svg: {
                fontCache: 'global'
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #f4f4f9; 
            
            /* UPDATED: Points to Flask's static folder */
            background-image: url('/static/background.png'); 
            
            background-size: cover;                  
            background-position: center;             
            background-attachment: fixed;            
            display: flex; 
            justify-content: center; 
            padding: 20px; 
            margin: 0;
        }
        
        #chat-container { width: 100%; max-width: 900px; background: rgba(255, 255, 255, 0.95); border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); padding: 20px; }
        
        #chat-box { height: 500px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; border-radius: 5px; background: #fafafa; }
        
        .message { margin: 10px 0; padding: 10px; border-radius: 5px; line-height: 1.6; font-size: 16px; }
        .user-msg { background-color: #007bff; color: white; text-align: right; margin-left: 20px; }
        
        .ai-msg { background-color: #e9ecef; color: black; margin-right: 20px; overflow-x: auto; }
        .ai-msg img { max-width: 100%; height: auto; }
        
        .error-msg { background-color: #ffcccc; color: #900; font-weight: bold; }
        #input-container { display: flex; gap: 10px; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; }
        button { padding: 12px 24px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>

<div id="chat-container">
    <h2 style="text-align: center; color: #333;">Doral Academy AI Tutor</h2>
    <div id="chat-box"></div>
    <div id="input-container">
        <input type="text" id="user-input" placeholder="Ask a question..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    let conversationHistory = [];

    async function sendMessage() {
        const inputField = document.getElementById("user-input");
        const chatBox = document.getElementById("chat-box");
        const message = inputField.value.trim();
        if (!message) return;

        chatBox.innerHTML += `<div class="message user-msg">${message}</div>`;
        inputField.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;

        conversationHistory.push({ "role": "user", "content": message });

        try {
            const response = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ messages: conversationHistory })
            });

            const data = await response.json();

            if (response.ok) {
                const formattedResponse = marked.parse(data.response);
                
                chatBox.innerHTML += `<div class="message ai-msg">${formattedResponse}</div>`;
                
                if (window.MathJax) {
                    MathJax.typesetPromise([chatBox]).catch(function (err) {
                        console.error('MathJax error: ', err.message);
                    });
                }

                conversationHistory.push({ "role": "assistant", "content": data.response });
            } else {
                chatBox.innerHTML += `<div class="message error-msg">Alert: ${data.response}</div>`;
                conversationHistory.pop(); 
            }
        } catch (error) {
            chatBox.innerHTML += `<div class="message error-msg">Error connecting to the AI Tutor.</div>`;
            conversationHistory.pop();
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function handleKeyPress(event) {
        if (event.key === "Enter") sendMessage();
    }
</script>

</body>
</html>
